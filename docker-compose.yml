services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_2022
    restart: unless-stopped
    ports:
      - '1433:1433'
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=${MSSQL_PID}
      - PORT=${PORT}
      - APP_ADMIN_USER=${APP_ADMIN_USER}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}
    volumes:
      - ./data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backups
      - ./entrypoint.sh:/usr/config/entrypoint.sh
    entrypoint:
      [
        '/bin/bash',
        '-c',
        "sed -i 's/\r$//' /usr/config/entrypoint.sh && exec /bin/bash /usr/config/entrypoint.sh"
      ]
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD} -Q 'SELECT 1' -b -C"
        ]
      interval: 10s
      timeout: 3s
      retries: 10
